<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ландшафт ID-сервисов РФ 2025</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 p-6">
    <div class="max-w-6xl mx-auto">
        <header class="mb-10 text-center"><h1 class="text-4xl font-bold">Экосистема ID 2025: Полный обзор</h1></header>
        
        <div class="grid md:grid-cols-2 gap-8 mb-10">
            <div class="bg-white p-6 rounded-xl shadow"><h2 class="text-xl font-bold mb-4">Структура рынка (доли)</h2><canvas id="marketChart"></canvas></div>
            <div class="bg-white p-6 rounded-xl shadow"><h2 class="text-xl font-bold mb-4">Охват банковских ID</h2><canvas id="bankChart"></canvas></div>
        </div>

        <div class="bg-white p-8 rounded-xl shadow">
            <h2 class="text-2xl font-bold mb-6">Полный реестр 45+ сервисов</h2>
            <div id="registry" class="grid grid-cols-2 md:grid-cols-4 gap-4 text-xs">
                <!-- Data injected via JS -->
            </div>
        </div>
    </div>

    <script>
        const services = [
            "ЕСИА", "ЕБС", "ЕМИАС", "Мир ID", "Ключ Ростелеком", "Сбер ID", "T-ID", "ВТБ ID", "Альфа ID", "Газпром ID", "ПСБ ID", "Росбанк ID",
            "Яндекс ID", "VK ID", "МТС ID", "Мегафон ID", "Билайн ID", "Tele2 ID", "Ростелеком ID", "CDEK ID", "Почта.ID", "WB ID", "Ozon ID", "X5 ID",
            "Магнит ID", "РЖД ID", "Яндекс Маркет ID", "Solar inRights", "Avanpost IDM", "1IDM", "BI.ZONE PAM", "Indeed AM", "Blitz", "Индиго", "Avanpost FAM",
            "SafeLogon", "MultiFactor", "UserGate", "Ideco", "UserGate", "TrustAccess", "Dallas Lock", "Secret Net Studio", "Аккорд"
        ];
        
        const registry = document.getElementById('registry');
        services.forEach(s => {
            registry.innerHTML += `<div class="p-2 border rounded bg-slate-50">${s}</div>`;
        });

        new Chart(document.getElementById('marketChart'), {
            type: 'pie',
            data: { labels: ['Гос', 'Банки', 'Тех', 'Ритейл', 'Корп'], datasets: [{ data: [11, 16, 17, 18, 38], backgroundColor: ['#4F46E5', '#10B981', '#06B6D4', '#F59E0B', '#6366F1'] }] }
        });
        new Chart(document.getElementById('bankChart'), {
            type: 'bar',
            data: { labels: ['Сбер', 'Т-Банк', 'ВТБ', 'Альфа', 'Газпром'], datasets: [{ label: 'Охват', data: [95, 82, 60, 55, 45], backgroundColor: '#10B981' }] }
        });
    </script>
</body>
</html>
